version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: nirvigh_hrms
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hrms_secure_pass_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms_user -d nirvigh_hrms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://hrms_user:${DB_PASSWORD:-hrms_secure_pass_2026}@postgres:5432/nirvigh_hrms
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 8h
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: "NAP HRMS <chiragramesh315@gmail.com>"
      APP_URL: ${APP_URL:-https://hrms.nirvighadvisors.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://hrms.nirvighadvisors.com}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

volumes:
  pgdata:
